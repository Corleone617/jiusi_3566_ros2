supervisor:
  log_dir: "/tmp/acfly_logs"
  health_check_hz: 2.0
  graceful_shutdown_timeout_sec: 10.0
  initial_backoff_sec: 1.0
  max_backoff_sec: 60.0
  # 进程连续正常运行超过该秒数后，重置崩溃退避到 initial_backoff_sec
  # 避免“早期反复崩溃→退避变大→长期正常后再次崩溃重启过慢”
  min_uptime_reset_sec: 30.0
  topic_check_interval_sec: 2.0

processes:
  - name: mavros
    command: "ros2"
    args: ["launch", "mavros", "acfly.launch.py"]
    auto_restart: true
    shutdown_timeout_sec: 15.0
    dependencies: []
    wait_for_topics: []

  - name: odin1_driver
    command: "ros2"
    args: ["run", "odin_ros_driver", "host_sdk_sample"]
    auto_restart: true
    dependencies: []
    wait_for_topics: []

  - name: timesync
    command: "ros2"
    # 用 ros2 launch 而非 ros2 run：timesync.launch.py 里写了 parameters=[config_yaml]，
    # 这样 timesync.yaml 才会被加载（ros2 run 不传 --params-file，参数全走代码默认值）。
    # 与 mavros 的启动方式一致。
    args: ["launch", "timesync", "timesync.launch.py"]
    auto_restart: true
    dependencies: ["mavros"]
    wait_for_topics: ["/mavros/time_reference", "/mavros/timesync_status"]

  - name: acfly_odometry
    command: "ros2"
    # 用 ros2 launch 加载 acfly_odometry.yaml（与 timesync/mavros 一致）
    args: ["launch", "acfly_odometry", "acfly_odometry.launch.py"]
    auto_restart: true
    dependencies: ["mavros", "odin1_driver"]
    wait_for_topics: ["/mavros/imu/data", "/odin1/odometry_highfreq"]

  - name: bag_logd
    command: "ros2"
    args: ["run", "bag_logd", "bag_logd_node"]
    auto_restart: true
    dependencies: ["timesync", "acfly_odometry"]
    wait_for_topics: []
